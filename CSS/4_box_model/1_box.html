<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Box Model Types</title>

  <style>
    /* Content-box (Default) */
    .content-box {
      width: 200px;
      padding: 20px;
      border: 5px solid black;
      background-color: lightblue;
      margin-bottom: 20px;
    }

    /* Border-box */
    .border-box {
      width: 200px;
      padding: 20px;
      border: 5px solid black;
      background-color: lightgreen;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <h3>Content-Box (Default)</h3>
  <div class="content-box">
    Content Box
  </div>

  <h3>Border-Box</h3>
  <div class="border-box">
    Border Box
  </div>

</body>
</html>
